<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="scripts/script-theme.js"></script>
    <title>请勿食用此蘑菇 - 蘑古力酱</title>

<body class="storm-bg" data-scene="choco">
    <div class="container">
        <div class="storm-scene" id="storm-scene">
            <div class="storm-svg-wrap" id="storm-svg-wrap">
                <div class="storm-frame-inner" id="storm-svg-host">

        <canvas id="particle-canvas"></canvas>

        </div>
    </div>
    <audio id="pull-sound" src="assets/pull.mp3" preload="auto"></audio>
    <audio id="pop-sound" src="assets/pop.mp3" preload="auto"></audio>
    <script src="scripts/script-storage-api.js"></script>
    <script src="scripts/script-wave-transition.js?v=222"></script>
