<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>请勿食用此蘑菇 - 灵感标本室</title>
    <script src="scripts/script-theme.js"></script>
    <link rel="stylesheet" href="styles/style-global.css">
    <link rel="stylesheet" href="styles/style-ideas.css">
    <link rel="stylesheet" href="styles/style-wave-transition.css?v=222">
</head>
<body data-back-href="content-ideas.html">
    <div class="topbar" id="topbar">
        <div class="topbar-left">
            <button class="topbar-btn" id="back-btn" aria-label="返回" type="button"><svg width="28" height="28" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false"><path d="M31 36L19 24L31 12" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        </div>
        <div class="topbar-center">
            <div class="topbar-title">灵感标本室</div>
        </div>
        <div class="topbar-right">
            <button class="more-btn" id="more-btn" aria-label="更多" type="button"><span class="more-icon" aria-hidden="true"></span></button>
            <div class="basket-wrapper" id="basket-wrapper">
                <button class="basket-btn" id="basket-btn" aria-label="篮子" type="button">🧺</button>
                <div class="basket-menu" id="basket-menu">
                    <button class="basket-item" id="basket-messages" aria-label="消息通知" type="button">🔔<span class="green-dot" id="dot-messages"></span></button>
                    <button class="basket-item" id="basket-storm" aria-label="孢子季风" type="button">🌪️</button>
                    <button class="basket-item" id="basket-favorites" aria-label="灵感标本室" type="button">🍄</button>
                </div>
            </div>
        </div>
    </div>
    <div class="container glass-container">
        <div class="ideas-list" id="favorites-list"></div>
        <div class="empty-state" id="empty-state" style="display:none;">标本室里还没有新的灵感标本</div>
    </div>
    <div class="drawer-overlay" id="drawer-overlay"></div>
    <div class="drawer" id="drawer" aria-hidden="true">
        <div class="drawer-header">
            <div class="drawer-title">更多</div>
            <button class="drawer-close" id="drawer-close" aria-label="关闭" type="button">×</button>
        </div>
        <div class="drawer-content">
            <button class="drawer-item" type="button" data-drawer-action="theme">主题模式</button>
            <button class="drawer-item" type="button" data-drawer-action="export">数据导出</button>
            <button class="drawer-item" type="button" data-drawer-action="about">关于这里</button>
        </div>
        <div class="drawer-panel" id="drawer-panel"></div>
    </div>
    <script src="scripts/script-storage-api.js"></script>
    <script src="scripts/script-ideas-shell.js"></script>
    <script src="scripts/script-ideas-favorites.js"></script>
    <script src="scripts/script-wave-transition.js?v=222"></script>
    <script src="scripts/script-transition.js"></script>
</body>
</html>
